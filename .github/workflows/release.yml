name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          zip -r TheFloorIsLava-ResourcePack.zip pack.mcmeta assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TheFloorIsLava-ResourcePack.zip
          generate_release_notes: true